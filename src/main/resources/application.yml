spring:
  application:
    name: oven-platform
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB_NAME}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
  kafka:
    producer:
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  mvc:
    apiversion:
      default: 1.0
      supported: 1.0, 2.0
      use:
        header: X-API-Version
jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}
oven:
  kafka:
    consumer:
      retry:
        interval: 1s
        max-retries: 3
    topics:
      auto-create: true
      orders: order-events
      kitchen: kitchen-events
      fulfillment: fulfillment-events
    consumer-groups:
      orders: oven-platform-orders
      kitchen: oven-platform-kitchen
      fulfillment: oven-platform-fulfillment
      payment: oven-platform-payment
  outbox:
    publishing:
      enabled: true
      fixed-delay: 5s
