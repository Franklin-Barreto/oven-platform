spring:
  application:
    name: oven-platform
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB_NAME}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
  modulith:
    events:
      completion-mode: update
      republish-outstanding-events-on-restart: true
      staleness:
        published: 10m
        processing: 10m
        resubmission: 10m
  mvc:
    apiversion:
      default: 1.0
      supported: 1.0, 2.0
      use:
        header: X-API-Version
jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}
oven:
  events:
    publication:
      maintenance:
        enabled: true
        fixed-delay: 1m
        retry-min-age: 30s
        retry-batch-size: 100
        retry-max-in-flight: 10
        retry-max-attempts: 5
        completed-retention: 7d
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${OVEN_ENVIRONMENT:local}

    distribution:
      slo:
        "[http.server.requests]":
          - 50ms
          - 100ms
          - 200ms
          - 300ms
          - 500ms
          - 1s
