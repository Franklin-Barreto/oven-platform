spring:
  kafka:
    consumer:
      auto-offset-reset: earliest

oven:
  kafka:
    consumer:
      retry:
        interval: 10ms
        max-retries: 3
    topics:
      auto-create: true
      kitchen: kitchen-events
      fulfillment: fulfillment-events
    consumer-groups:
      orders: oven-platform-orders-test
      kitchen: oven-platform-kitchen-test
      fulfillment: oven-platform-fulfillment-test
