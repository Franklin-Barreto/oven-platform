apiVersion: 1
groups:
  - orgId: 1
    name: durable-event-publications
    folder: Oven Platform
    interval: 10s
    rules:
      - uid: efspf7doins3kc
        title: DurableEventPublicationStale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: builder
              expr: max(oven_events_publications_oldest_incomplete_age_seconds{application="oven-platform"})
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            queryType: expression
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 60
                    type: gte
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        annotations:
          description: The oldest incomplete durable event publication is {{ $values.A.Value }} seconds old. Investigate the event publication registry and downstream module listeners.
          runbook_url: https://github.com/Franklin-Barreto/oven-platform/blob/main/docs/observability.md#stale-durable-publication-alert
          summary: Durable event publication has been incomplete for more than 60 seconds
        labels:
          category: durable-event-publication
          service: oven-platform
          severity: critical
        isPaused: false
        notification_settings:
          receiver: local-webhook
